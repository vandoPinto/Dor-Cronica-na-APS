        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
    </div>
    <div id="conteudo"></div>





    <!-- rodapé -->
    <div class="timeline">
        <div class="row align-items-center" style="">

            <!-- Botões -->
            <div class="col-md-6 text-center text-md-start ">
                <div class="d-flex justify-content-center justify-content-md-start gap-4 flex-wrap">

                    <div class="text-center">
                        <small>Início</small><br>
                        <button class="btn border-0"><img src=" img/icon_home.png" alt=""></button>
                        <!-- <button class="btn rounded-circle border-0" style="width:55px; height:55px;"">
                        </button> -->
                    </div>

                    <div id="btVo" onclick="Navega('volta')" class="text-center">
                        <small>Voltar</small><br>
                        <button class="btn rounded-circle border border-primary"
                            style="width:55px; height:55px; background:#fff; color:#0d47ff;">
                            ◀
                        </button>
                    </div>

                    <div id="btAv" onclick="Navega('avanca')" class="text-center">
                        <small>Avançar</small><br>
                        <button class="btn rounded-circle border-0"
                            style="width:55px; height:55px; background:#0d47ff; color:#fff;">
                            ▶
                        </button>
                    </div>

                </div>
            </div>

            <!-- Progresso -->
            <div id="progresso" class="col-md-6 text-center">
                <p>Seu progresso <span id="progressoAtual">0</span>/<span id="totalProgresso">0</span></p>
                <div class="d-inline-block" style="width:260px;">
                    <div class="progress"
                        style="height:14px; border:3px solid #0d47ff; border-radius:20px; background:#d9d4c7;">
                        <div id="progress-bar" style="width:20%; background:#f39200; border-radius:20px;">
                        </div>
                    </div>
                </div>
            </div>

        </div>
        <!-- Barra inferior -->
        <div class="row g-0">
            <div class="col-12">
                <div style="height:20px; background:#f39200;"></div>
            </div>
        </div>
    </div>
