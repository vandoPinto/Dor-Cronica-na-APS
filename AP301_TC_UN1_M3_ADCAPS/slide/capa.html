<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>
        body {
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* COMPONENTE CARD */
        .comic-card {
            width: 500px;
            max-width: 95%;
            background: #e9e9e9;
            border: 3px solid #0d47ff;
            border-radius: 32px;
            padding: 22px;
            position: relative;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
        }

        .comic-frame {
            border: 3px solid #0d47ff;
            overflow: hidden;
            background: #fff;
        }

        .comic-frame img {
            width: 100%;
            display: block;
            object-fit: cover;
        }

        .divider-line {
            height: 4px;
            background: #111;
            width: 100%;
        }

        .zoom-btn {
            position: absolute;
            bottom: 28px;
            left: 42px;
            width: 92px;
            height: 92px;
            border: none;
            border-radius: 50%;
            background: #1f5cff;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.25);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform .25s ease;
        }

        .zoom-btn:hover {
            transform: scale(1.08);
        }

        .zoom-btn svg {
            width: 48px;
            height: 48px;
        }

        @media (max-width:768px) {
            .comic-card {
                border-radius: 24px;
                padding: 16px;
            }

            .zoom-btn {
                width: 72px;
                height: 72px;
                left: 28px;
                bottom: 22px;
            }

            .zoom-btn svg {
                width: 38px;
                height: 38px;
            }
        }
    </style>
</head>

<body>

    <!-- COMPONENTE -->
    <div class="comic-card">

        <div class="comic-frame">
            <img src="https://via.placeholder.com/800x550?text=Imagem+Superior" alt="Cena superior">
            <div class="divider-line"></div>
            <img src="https://via.placeholder.com/800x550?text=Imagem+Inferior" alt="Cena inferior">
        </div>

        <button class="zoom-btn">
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="27" cy="27" r="16" stroke="white" stroke-width="4" />
                <line x1="39" y1="39" x2="53" y2="53" stroke="white" stroke-width="4" stroke-linecap="round" />
                <line x1="27" y1="20" x2="27" y2="34" stroke="white" stroke-width="4" stroke-linecap="round" />
                <line x1="20" y1="27" x2="34" y2="27" stroke="white" stroke-width="4" stroke-linecap="round" />
            </svg>
        </button>

    </div>


    <button class="btn-play">
        <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
            <circle class="play-circle" cx="32" cy="32" r="28" fill="#0d47ff" />
            <path class="play-icon" d="M26 20L44 32L26 44Z" fill="white" />
        </svg>
    </button>

    <style>
        .btn-play {
            width: 90px;
            height: 90px;
            border: none;
            background: transparent;
            padding: 0;
            cursor: pointer;
            filter: drop-shadow(8px 8px 10px rgba(0, 0, 0, 0.28));
        }

        .btn-play svg {
            width: 100%;
            height: 100%;
        }

        .play-circle,
        .play-icon {
            transition: all 0.3s ease;
        }

        .btn-play:hover .play-circle {
            fill: #ffffff;
            stroke: #0d47ff;
            stroke-width: 3;
        }

        .btn-play:hover .play-icon {
            fill: #0d47ff;
        }
    </style>
</body>

</html>
